services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orr_backend_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SERVICE=web
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    depends_on:
      - db
    command:  ["/app/entrypoint.dev.sh"]
    
        
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orr_backend_worker
    command: >
      sh -c "./wait-for-it.sh db:5432 --
            exec poetry run celery -A core worker --loglevel=info"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SERVICE=worker
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    depends_on:
      - db
      - redis
  
  beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orr_backend_beat
    command: >
      sh -c "./wait-for-it.sh db:5432 --
            exec poetry run celery -A core beat --loglevel=info"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SERVICE=beat
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    depends_on:
      - db
      - redis


  db:
    image: postgres:16
    container_name: orr_backend_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: orr_backend_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
