{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #ddd;
        }

        .header {
            padding: 20px;
            text-align: center;
            background-color: #ffffff !important;
        }

        /* Logo styling */
        .logo {
            max-width: 160px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .content {
            padding: 20px;
            color: #333;
            font-size: 16px;
            line-height: 1.5;
        }

        .footer {
            padding: 15px;
            text-align: center;
            background: #f1f1f1;
            font-size: 12px;
            color: #777;
        }

        /* ----------------------------- */
        /* DARK MODE SUPPORT (Gmail + iOS) */
        /* ----------------------------- */

        /* Apple Mail, Outlook.com, iOS */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212 !important;
            }

            .container {
                background-color: #1e1e1e !important;
            }

            .content {
                color: #e6e6e6 !important;
            }

            .footer {
                background-color: #222 !important;
                color: #aaa !important;
            }

            /* header should stay light for logo */
            .header {
                background-color: #ffffff !important;
            }
        }

        /* Gmail Dark Mode (special hack) */
        [data-ogsc] .header {
            background: #ffffff !important;
        }
        [data-ogsc] .container {
            background: #1e1e1e !important;
        }
        [data-ogsc] body {
            background: #121212 !important;
        }
        [data-ogsc] .content {
            color: #e6e6e6 !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="" alt="Nexucon Logo" class="logo">
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer">
            &copy; {{ year }} Nexucon. All rights reserved.
        </div>
    </div>
</body>
</html>
