services:
  - type: web
    name: orr-backend
    env: python
    repo: https://github.com/OLOWONISHAYE-SUNKANMI/orr_backend.git
    branch: staging
    buildCommand: |
     pip install poetry && poetry install --no-root
     python manage.py migrate
     python manage.py collectstatic --noinput
     python manage.py create_superuser

    startCommand: "gunicorn core.wsgi:application --preload"
    envVars:
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: "orr.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: orr-db
          property: connectionString
      - key: CELERY_BROKER_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: worker
    name: orr-worker
    env: python
    repo: https://github.com/OLOWONISHAYE-SUNKANMI/orr_backend.git
    branch: staging
    buildCommand: "pip install poetry && poetry install --no-root"
    startCommand: "poetry run celery -A core worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orr-db
          property: connectionString
      - key: CELERY_BROKER_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true



databases:
  - name: orr-db
